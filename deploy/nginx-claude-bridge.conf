# Claude IDE Bridge — nginx reverse proxy
# Exposes the bridge's /mcp Streamable HTTP endpoint over HTTPS.
#
# Prerequisites:
#   1. DNS:    bridge.massappealdesigns.co.ke → your VPS IP
#   2. Cert:   certbot --nginx -d bridge.massappealdesigns.co.ke
#   3. nginx:  copy to /etc/nginx/sites-available/claude-bridge
#              ln -s /etc/nginx/sites-available/claude-bridge /etc/nginx/sites-enabled/
#              nginx -t && systemctl reload nginx
#
# After certbot runs it will modify this file to add SSL directives.
# Run certbot AFTER enabling the site so the HTTP-01 challenge can complete.

server {
    listen 80;
    listen [::]:80;
    server_name bridge.massappealdesigns.co.ke;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS once cert is obtained
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bridge.massappealdesigns.co.ke;

    # --- TLS (Certbot will populate these) ---
    # ssl_certificate     /etc/letsencrypt/live/bridge.massappealdesigns.co.ke/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bridge.massappealdesigns.co.ke/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- /mcp — Streamable HTTP MCP endpoint ---
    location /mcp {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;

        # Required for SSE (GET /mcp) streaming — must not buffer
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        # Forward auth and session headers
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Mcp-Session-Id $http_mcp_session_id;
        proxy_pass_header Mcp-Session-Id;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade passthrough (for WebSocket fallback if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # --- /health — public health check (no auth required at proxy level) ---
    location /health {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # --- /.well-known — MCP server card and OAuth discovery ---
    location /.well-known/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # --- Block everything else ---
    location / {
        return 404;
    }

    # --- Connection upgrade map (needed for WebSocket header) ---
    # Add to /etc/nginx/nginx.conf http block if not already present:
    # map $http_upgrade $connection_upgrade {
    #     default upgrade;
    #     ''      close;
    # }
}
