# Create the 'security-review-required' label in GitHub repo settings before this workflow fires.
name: Reviewer Gate Check

on:
  pull_request:
    paths:
      - 'src/tools/runCommand*'
      - 'src/fp/automationInterpreter*'
      - 'src/fp/automationProgram*'
      - 'src/tools/utils.ts'
      - 'scripts/**/allowlist*'
      - 'src/companions/registry.ts'
      - '.github/workflows/**'

jobs:
  gate-check:
    name: Security reviewer gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Post reviewer gate reminder
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🔒 Security Reviewer Gate

            This PR touches security-sensitive files. Before merging, complete the checklist in the PR description:

            - [ ] \`patchwork shadow-scan --since 30d\` output included
            - [ ] Error messages match spec in \`documents/error-messages.md\`
            - [ ] \`patchwork recipe audit-env\` run on any affected recipes
            - [ ] At least one reviewer with security context has approved

            _This comment is posted automatically when security-sensitive paths are modified._`;

            // Only post if no existing gate comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Security Reviewer Gate') &&
              c.user.login === 'github-actions[bot]'
            );
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Add label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['security-review-required'],
              });
            } catch (e) {
              // Label may not exist yet — non-fatal
              console.log('Could not add label:', e.message);
            }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install patchwork
        run: npm install -g patchwork-os

      - name: Run shadow scan
        id: shadow_scan
        continue-on-error: true
        run: |
          patchwork shadow-scan --since 30d --json > /tmp/shadow-scan-output.json 2>&1 || true
          echo "reclassified=$(cat /tmp/shadow-scan-output.json | jq '.reclassified // 0')" >> $GITHUB_OUTPUT

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: shadow-scan-${{ github.event.pull_request.number }}
          path: /tmp/shadow-scan-output.json
          retention-days: 30

      - name: Post scan summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '_(shadow-scan output unavailable)_';
            try {
              const data = JSON.parse(fs.readFileSync('/tmp/shadow-scan-output.json', 'utf8'));
              summary = `**Scanned:** ${data.scanned} runs  \n**Reclassified:** ${data.reclassified}\n\n${data.summary || ''}`;
            } catch (e) {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Shadow-scan results\n\n${summary}\n\n_Full output available as artifact \`shadow-scan-${{ github.event.pull_request.number }}\`_`
            });
