name: Publish to npm

on:
  push:
    tags:
      - 'v*-alpha*'
      - 'v*-beta*'
  # Canary publishes fire after CI succeeds on a main push (a PR merge).
  # Consolidated here from the former publish-canary.yml: npm trusted
  # publishing allows only ONE trusted-publisher entry per package,
  # matched by exact workflow filename — so every publish path for this
  # package must live in this single file.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: read

jobs:
  publish-alpha:
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-alpha')
    runs-on: ubuntu-latest
    # id-token: write is required for npm OIDC trusted publishing — npm
    # exchanges the GitHub Actions OIDC token for a short-lived registry
    # credential, so no NPM_TOKEN secret is stored or can expire.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Deliberately NO `registry-url:` — setup-node would write an
      # .npmrc with a placeholder `_authToken`, and `npm publish` would
      # then attempt (failing) token auth instead of OIDC. OIDC requires
      # npm see no auth token. Default registry is registry.npmjs.org.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # OIDC trusted publishing requires npm >= 11.5.1; node 20 ships
      # npm 10.x. Upgrade in place.
      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test -- --reporter=dot
        timeout-minutes: 5

      # Idempotency guard — re-pushing the same tag (e.g. to re-trigger a
      # sibling workflow on a fixed file) would otherwise fail loudly with
      # E403 because the version is already on the registry. Skip cleanly
      # when that's the case.
      - name: Check if version already published
        id: npm_check
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "patchwork-os@$V" version > /dev/null 2>&1; then
            echo "Already published: patchwork-os@$V — skipping npm publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN — OIDC authenticates via the trusted-publisher
      # config on npmjs.com. Provenance attestation is emitted automatically
      # for trusted-publisher publishes.
      - name: Publish alpha to npm
        if: steps.npm_check.outputs.skip != 'true'
        run: npm publish --access public --tag alpha

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.OOLAB_PAT }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo Oolab-labs/patchwork-os > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping"
            exit 0
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --prerelease \
            --generate-notes \
            --repo Oolab-labs/patchwork-os

  publish-beta:
    # Mirror of publish-alpha but uses --tag beta. Beta is the active
    # prerelease channel as of 0.2.0-beta.0; alpha path is retained so
    # an emergency hotfix to the alpha line can still ship if needed.
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-beta')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test -- --reporter=dot
        timeout-minutes: 5

      # Idempotency guard — see publish-alpha for rationale.
      - name: Check if version already published
        id: npm_check
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "patchwork-os@$V" version > /dev/null 2>&1; then
            echo "Already published: patchwork-os@$V — skipping npm publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish beta to npm
        if: steps.npm_check.outputs.skip != 'true'
        run: npm publish --access public --tag beta

      # Beta is the active release line; keep `latest` in sync so
      # `npm i patchwork-os` and the npmjs.com page stay current.
      # When a stable (non-prerelease) version ships, remove this step.
      - name: Point latest dist-tag to this beta
        if: steps.npm_check.outputs.skip != 'true'
        run: |
          V=$(node -p "require('./package.json').version")
          npm dist-tag add patchwork-os@$V latest

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.OOLAB_PAT }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo Oolab-labs/patchwork-os > /dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping"
            exit 0
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --prerelease \
            --generate-notes \
            --repo Oolab-labs/patchwork-os

  publish:
    # Stable publish runs only on manual workflow_dispatch. Without this guard
    # an alpha tag push (`v*-alpha*`) would also trigger this job, which would
    # then fail noisily because `inputs.bump` is unset on tag events — or, if
    # ever edited, could publish a stable bump from an alpha tag.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.OOLAB_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --reporter=dot
        timeout-minutes: 5

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit and tag version bump
        env:
          HUSKY: "0"
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump to ${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin main
          git push origin "v${{ env.VERSION }}"

      # Idempotency guard — if the tag was pushed but publish failed and the
      # job was re-run, the version may already be on the registry. Skip
      # cleanly rather than failing with E403.
      - name: Check if version already published
        id: npm_check
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "patchwork-os@$V" version > /dev/null 2>&1; then
            echo "Already published: patchwork-os@$V — skipping npm publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.skip != 'true'
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.OOLAB_PAT }}
        run: |
          if gh release view "v${{ env.VERSION }}" --repo Oolab-labs/patchwork-os > /dev/null 2>&1; then
            echo "Release v${{ env.VERSION }} already exists — skipping"
            exit 0
          fi
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --generate-notes \
            --repo Oolab-labs/patchwork-os

  publish-canary:
    # Fires after the CI workflow succeeds on a main push (a PR merge):
    # publishes a <version>.canary.<run_number> build under the `canary`
    # dist-tag so `npm install -g patchwork-os@canary` tracks main.
    # `latest` / `beta` users are untouched. Consolidated from the former
    # publish-canary.yml — see the `on:` block above for why.
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the exact commit CI validated, not whatever main is now.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      # Canary version shape: <current>.canary.<runNumber> — always sorts
      # above the base version and below the next base bump.
      - name: Compute canary version
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version")
          CANARY="${BASE}.canary.${{ github.run_number }}"
          echo "version=$CANARY" >> "$GITHUB_OUTPUT"
          echo "Canary version: $CANARY"

      # Idempotency: a workflow_run retry would otherwise fail with E403.
      - name: Check if version already published
        id: npm_check
        run: |
          if npm view "patchwork-os@${{ steps.ver.outputs.version }}" version > /dev/null 2>&1; then
            echo "Already published — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write canary version into package.json
        if: steps.npm_check.outputs.skip != 'true'
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '${{ steps.ver.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "

      # No NODE_AUTH_TOKEN — OIDC trusted publishing, same as the tagged
      # publish jobs above.
      - name: Publish canary to npm
        if: steps.npm_check.outputs.skip != 'true'
        run: npm publish --access public --tag canary

      - name: Summary
        if: always()
        run: |
          echo "### Canary publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped: \`${{ steps.npm_check.outputs.skip == 'true' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install: \`npm install -g patchwork-os@canary\`" >> "$GITHUB_STEP_SUMMARY"
