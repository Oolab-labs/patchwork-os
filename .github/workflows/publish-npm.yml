name: Publish to npm

on:
  push:
    tags:
      - 'v*-alpha*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  publish-alpha:
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-alpha')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test -- --reporter=dot
        timeout-minutes: 5

      - name: Publish alpha to npm
        run: npm publish --access public --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.OOLAB_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --prerelease \
            --generate-notes \
            --repo Oolab-labs/claude-ide-bridge

  publish:
    # Stable publish runs only on manual workflow_dispatch. Without this guard
    # an alpha tag push (`v*-alpha*`) would also trigger this job, which would
    # then fail noisily because `inputs.bump` is unset on tag events — or, if
    # ever edited, could publish a stable bump from an alpha tag.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.OOLAB_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --reporter=dot
        timeout-minutes: 5

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit and tag version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump to ${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin main
          git push origin "v${{ env.VERSION }}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.OOLAB_PAT }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --generate-notes \
            --repo Oolab-labs/claude-ide-bridge
