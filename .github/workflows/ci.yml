name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    # windows-latest was advisory through PRs #497–#501 while the
    # pre-existing POSIX-only test gaps were closed (126 → 0 failures).
    # Now a real blocking check.
    strategy:
      fail-fast: false
      matrix:
        # Node 20 reached EOL April 2026; removed from GitHub-hosted runners Sept 2026.
        os: [ubuntu-latest, windows-latest]
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Type check
        run: npm run typecheck
      - name: Type check tests (core ratchet)
        run: npm run typecheck:tests:core
      - name: Lint
        run: npm run lint
      - name: Audit test fixture hygiene
        run: node scripts/audit-test-fixtures.mjs
      - name: Guard against optional-chaining on prompt variables
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('src/automation.ts', 'utf8');
            const bad1 = /cfg\.prompt\?\..*replace\(/.test(src);
            const bad2 = /^\s+\?\.replace\(/m.test(src);
            if (bad1 || bad2) { console.error('ERROR: optional-chain .replace() on prompt variable'); process.exit(1); }
          "
      - name: Build
        run: npm run build
      - name: Test
        run: npm test -- --reporter=dot --reporter=github-actions
        # Bumped 5→10: the suite has grown past the old 5-minute ceiling (local
        # run: 335s of test time alone, no coverage overhead) and windows-latest
        # runners are consistently slower — CI was killing the step at ~5m0s-5m2s
        # with no failing assertion anywhere in the log, just a hard SIGTERM
        # mid-run. Not a hang; confirmed via a full local `vitest run`
        # completing clean (8759 passed).
        timeout-minutes: 10
      - name: Coverage (enforce 71% lines / 62% branches / 70% functions)
        run: npm run test:coverage -- --reporter=dot --reporter=github-actions
        timeout-minutes: 8

  schema-audit:
    name: Tool schema breaking-change gate
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: npm run build
      - name: Audit tool schemas against snapshot
        run: node scripts/audit-schema-changes.mjs

  lsp-audit:
    name: LSP tool registry audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Audit LSP tool lists
        run: node scripts/audit-lsp-tools.mjs
      - name: Audit shape safety (proxy<T> usage)
        run: node scripts/audit-shape-safety.mjs
      - name: Audit IntelliJ ↔ VSCode wire-method parity
        run: node scripts/audit-intellij-parity.mjs
      - name: Audit runner-parity xfail ratchet (#850)
        run: node scripts/audit-parity-xfails.mjs
      - name: Audit docs⇒wired parity (#850)
        run: node scripts/audit-docs-wired.mjs
      - name: Audit docs drift (advisory, tool-count/coverage claims)
        run: node scripts/audit-docs-drift.mjs

  plugin-validate:
    name: Validate plugin manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin.json exists
        run: test -f claude-ide-bridge-plugin/.claude-plugin/plugin.json

      - name: Validate plugin.json schema
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('claude-ide-bridge-plugin/.claude-plugin/plugin.json', 'utf8'));
            const required = ['name', 'version', 'description', 'author', 'license'];
            for (const f of required) {
              if (!p[f]) throw new Error('plugin.json missing required field: ' + f);
            }
            const semver = /^\d+\.\d+\.\d+$/;
            if (!semver.test(p.version)) throw new Error('plugin.json version is not semver: ' + p.version);
            console.log('plugin.json valid:', p.name, p.version);
          "

      - name: Check plugin icon exists
        run: test -f claude-ide-bridge-plugin/icon.png

      - name: Check MCP config exists and is valid
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('claude-ide-bridge-plugin/.mcp.json', 'utf8'));
            if (!m.mcpServers) throw new Error('.mcp.json missing mcpServers');
            const servers = Object.keys(m.mcpServers);
            if (!servers.length) throw new Error('.mcp.json has no servers defined');
            console.log('.mcp.json valid — servers:', servers.join(', '));
          "

      - name: Validate skill SKILL.md frontmatter
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const skillsDir = 'claude-ide-bridge-plugin/skills';
            const dirs = fs.readdirSync(skillsDir);
            for (const d of dirs) {
              const f = path.join(skillsDir, d, 'SKILL.md');
              if (!fs.existsSync(f)) throw new Error('Missing SKILL.md in ' + d);
              const c = fs.readFileSync(f, 'utf8');
              if (!c.startsWith('---')) throw new Error('SKILL.md missing frontmatter: ' + d);
              if (!c.includes('name:')) throw new Error('SKILL.md missing name: ' + d);
              if (!c.includes('description:')) throw new Error('SKILL.md missing description: ' + d);
              console.log('  ok:', d);
            }
            console.log('All', dirs.length, 'skills valid');
          "

      - name: Validate agent frontmatter
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const agentsDir = 'claude-ide-bridge-plugin/agents';
            const files = fs.readdirSync(agentsDir).filter(f => f.endsWith('.md'));
            for (const f of files) {
              const c = fs.readFileSync(path.join(agentsDir, f), 'utf8');
              if (!c.startsWith('---')) throw new Error('Agent missing frontmatter: ' + f);
              if (!c.includes('name:')) throw new Error('Agent missing name: ' + f);
              if (!c.includes('description:')) throw new Error('Agent missing description: ' + f);
              console.log('  ok:', f);
            }
            console.log('All', files.length, 'agents valid');
          "

  smoke:
    name: Smoke tests (live bridge)
    runs-on: ${{ matrix.os }}
    needs: ci
    # windows-latest is blocking. Was advisory through PRs #527–#536 while
    # the smoke harness was being ported (.cmd shims, CRLF batch files,
    # tree-kill, HTTP /shutdown for clean exit). Five consecutive green
    # runs across #533-#536; advisory mode no longer needed.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: npm run build
      - name: Run smoke test suite (POSIX)
        if: matrix.os != 'windows-latest'
        run: BRIDGE="$(pwd)/scripts/smoke/bridge" node scripts/smoke/run-all.mjs
        timeout-minutes: 3
      - name: Run smoke test suite (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          set "BRIDGE=%CD%\scripts\smoke\bridge.cmd"
          node scripts\smoke\run-all.mjs
        timeout-minutes: 5

  benchmark:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: npm run build
      - name: Start bridge
        run: |
          mkdir -p /tmp/bench-workspace
          node dist/index.js --workspace /tmp/bench-workspace > /tmp/bridge.log 2>&1 &
          echo $! > /tmp/bridge.pid
          # Wait up to 10s for the lock file to appear
          for i in $(seq 1 20); do
            LOCK_FILE=$(ls "$HOME/.claude/ide/"*.lock 2>/dev/null | head -1)
            [ -n "$LOCK_FILE" ] && break
            sleep 0.5
          done
          if [ -z "$LOCK_FILE" ]; then
            echo "Bridge did not write lock file" && cat /tmp/bridge.log && exit 1
          fi
          # Extract port from lock filename and wait for /health to respond
          BRIDGE_PORT=$(basename "$LOCK_FILE" .lock)
          for i in $(seq 1 20); do
            curl -sf "http://127.0.0.1:${BRIDGE_PORT}/ping" && break
            sleep 0.5
          done
          curl -sf "http://127.0.0.1:${BRIDGE_PORT}/ping" || (echo "Bridge /health did not respond" && cat /tmp/bridge.log && exit 1)
      - name: Run benchmark
        # main: strict 100ms threshold; PRs: loose 500ms threshold catches only extreme regressions
        run: |
          node scripts/benchmark.mjs --iterations 100 --json \
            ${{ github.ref == 'refs/heads/main' && '--threshold 100' || '--threshold 500' }} \
            | tee /tmp/benchmark-results.json
      - name: Stop bridge
        if: always()
        run: kill "$(cat /tmp/bridge.pid)" 2>/dev/null || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: /tmp/benchmark-results.json
          retention-days: 30

  dashboard:
    name: Dashboard typecheck + tests
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Token consistency (tokens.json ↔ globals.css)
        run: npm run tokens:check
      - name: Inline fontSize ratchet
        run: npm run lint:inline-fontsize
      - name: Test
        run: npm test

  extension:
    runs-on: ${{ matrix.os }}
    needs: ci
    # windows-latest is blocking. Was advisory through PRs #527–#536; with
    # the five extension test suites un-skipped (#535) and four green PR
    # runs in a row, advisory mode is no longer needed.
    strategy:
      fail-fast: false
      matrix:
        # Node 20 reached EOL April 2026; removed from GitHub-hosted runners Sept 2026.
        os: [ubuntu-latest, windows-latest]
        node-version: [22]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  push-relay:
    name: Push relay typecheck + tests
    runs-on: ubuntu-latest
    needs: ci
    defaults:
      run:
        working-directory: services/push-relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/push-relay/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npm test

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        # Retry to ride out transient Docker Hub registry timeouts on base-image
        # pulls. The `# syntax=` directive was removed from the Dockerfile so
        # BuildKit no longer fetches the docker/dockerfile frontend at build start
        # (the recurring `registry-1.docker.io ... i/o timeout` flake).
        run: |
          for attempt in 1 2 3; do
            docker build --build-arg GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" -t patchwork-smoke . && exit 0
            echo "::warning::docker build attempt $attempt failed (likely a transient Docker Hub timeout); retrying in 15s"
            sleep 15
          done
          echo "docker build failed after 3 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Start container
        run: |
          docker run -d --name pw-smoke \
            -p 18765:18765 \
            patchwork-smoke \
            --workspace /workspace \
            --bind 0.0.0.0 \
            --port 18765 \
            --fixed-token 00000000-0000-0000-0000-000000000001
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/ping; then
              echo "Bridge is up"
              exit 0
            fi
            sleep 2
          done
          echo "Bridge failed to start in 60s"
          docker logs pw-smoke
          exit 1
      - name: Verify tools/list returns tools
        run: |
          # MCP handshake: initialize → notifications/initialized → tools/list
          INIT_RESPONSE=$(curl -sf -D - -X POST \
            -H "Authorization: Bearer 00000000-0000-0000-0000-000000000001" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            http://127.0.0.1:18765/mcp)
          SESSION_ID=$(echo "$INIT_RESPONSE" | grep -i "^mcp-session-id:" | tr -d '\r' | awk '{print $2}')
          echo "Session ID: $SESSION_ID"
          # notifications/initialized completes the handshake (returns 202, no body)
          curl -sf -X POST \
            -H "Authorization: Bearer 00000000-0000-0000-0000-000000000001" \
            -H "Content-Type: application/json" \
            -H "Mcp-Session-Id: $SESSION_ID" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            http://127.0.0.1:18765/mcp || true
          COUNT=$(curl -sf -X POST \
            -H "Authorization: Bearer 00000000-0000-0000-0000-000000000001" \
            -H "Content-Type: application/json" \
            -H "Mcp-Session-Id: $SESSION_ID" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            http://127.0.0.1:18765/mcp | jq '.result.tools | length')
          echo "Tool count: $COUNT"
          [ "$COUNT" -gt "0" ]
      - name: Stop container
        if: always()
        run: docker stop pw-smoke && docker rm pw-smoke

