name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  benchmark:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start bridge
        run: |
          mkdir -p /tmp/bench-workspace
          node dist/index.js --workspace /tmp/bench-workspace > /tmp/bridge.log 2>&1 &
          echo $! > /tmp/bridge.pid
          # Wait up to 10s for the lock file to appear
          for i in $(seq 1 20); do
            LOCK_FILE=$(ls "$HOME/.claude/ide/"*.lock 2>/dev/null | head -1)
            [ -n "$LOCK_FILE" ] && break
            sleep 0.5
          done
          if [ -z "$LOCK_FILE" ]; then
            echo "Bridge did not write lock file" && cat /tmp/bridge.log && exit 1
          fi
          # Extract port from lock filename and wait for /health to respond
          BRIDGE_PORT=$(basename "$LOCK_FILE" .lock)
          for i in $(seq 1 20); do
            curl -sf "http://127.0.0.1:${BRIDGE_PORT}/health" && break
            sleep 0.5
          done
          curl -sf "http://127.0.0.1:${BRIDGE_PORT}/health" || (echo "Bridge /health did not respond" && cat /tmp/bridge.log && exit 1)
      - name: Run benchmark
        # --threshold only enforced on main; PRs upload results for comparison only
        run: |
          node scripts/benchmark.mjs --iterations 100 --json \
            ${{ github.ref == 'refs/heads/main' && '--threshold 100' || '' }} \
            | tee /tmp/benchmark-results.json
      - name: Stop bridge
        if: always()
        run: kill "$(cat /tmp/bridge.pid)" 2>/dev/null || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: /tmp/benchmark-results.json
          retention-days: 30

  extension:
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
