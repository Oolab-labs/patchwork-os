name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  benchmark:
    runs-on: ubuntu-latest
    needs: ci
    # Only gate on main; PRs still upload results for comparison
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start bridge
        run: |
          mkdir -p /tmp/bench-workspace
          node dist/index.js --workspace /tmp/bench-workspace > /tmp/bridge.log 2>&1 &
          echo $! > /tmp/bridge.pid
          # Wait up to 10s for the lockfile to appear
          for i in $(seq 1 20); do
            ls "$HOME/.claude/ide/"*.lock 2>/dev/null | head -1 && break
            sleep 0.5
          done
          ls "$HOME/.claude/ide/"*.lock 2>/dev/null || (echo "Bridge did not write lock file" && cat /tmp/bridge.log && exit 1)
      - name: Run benchmark
        run: |
          node scripts/benchmark.mjs --iterations 100 --json --threshold 100 \
            | tee /tmp/benchmark-results.json
      - name: Stop bridge
        if: always()
        run: kill "$(cat /tmp/bridge.pid)" 2>/dev/null || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: /tmp/benchmark-results.json
          retention-days: 30

  extension:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
