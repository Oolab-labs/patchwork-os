<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Patchwork app icon — recessed P + jewel dot, at iOS-app-grade scale.

    Composition reproportioned to fill the canvas like a real iOS app
    icon (Uber wordmark fills ~75% width; Claude burst fills ~65% both
    axes). Previous draft sat at 24%×66% (P) which read as small/timid
    next to neighboring apps on the home screen.

    New geometry:
      Cap height 380 (≈ 74% of canvas height)
      Stem 80 px wide (was 60)
      Bowl extends to x=311 (semicircle r=95, dy=190)
      Total P bounds 241 wide × 380 tall (47% × 74%)
      Dot scaled to r=60 at (420, 110); halo + specular scaled to match

    Material treatment unchanged from prior G1 master: warm-charcoal
    vertical gradient bg, recessed P with inner shadow + top-rim
    highlight, jewel dot with halo + base inner shadow + specular.
  -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#231e18"/>
      <stop offset="55%"  stop-color="#16120e"/>
      <stop offset="100%" stop-color="#0d0a07"/>
    </linearGradient>

    <radialGradient id="rimGlow" cx="50%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#5a3a1c" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#3a2510" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fdfdfc"/>
      <stop offset="55%"  stop-color="#f0eeea"/>
      <stop offset="100%" stop-color="#dcd8d1"/>
    </linearGradient>

    <filter id="pInnerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dx="0" dy="3.5" result="off1"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="off1" operator="in" result="shadow1"/>
      <feComposite in="SourceGraphic" in2="shadow1" operator="over"/>
    </filter>

    <linearGradient id="pRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="6%"   stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="dotGrad" cx="50%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#ff9266"/>
      <stop offset="45%"  stop-color="#f07238"/>
      <stop offset="100%" stop-color="#c44d18"/>
    </radialGradient>

    <radialGradient id="dotHalo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#ef6a2a" stop-opacity="0.34"/>
      <stop offset="55%"  stop-color="#c44d18" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="dotInner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="3" result="off1"/>
      <feFlood flood-color="#5a1f05" flood-opacity="0.55"/>
      <feComposite in2="off1" operator="in" result="shadow1"/>
      <feComposite in="SourceGraphic" in2="shadow1" operator="over"/>
    </filter>

    <clipPath id="canvasClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Base canvas -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Warm rim glow inside the rounded square -->
  <g clip-path="url(#canvasClip)">
    <rect width="512" height="512" fill="url(#rimGlow)"/>
  </g>

  <!--
    P path:
      Outer (clockwise): (70, 66) → top of stem (150, 66) → flat top
      to (216, 66) → semicircle right A 95 95 to (216, 256) →
      back to stem (150, 256) → down (150, 446) → (70, 446) → close.
      Counter: centered in bowl with 45 px top + 45 px bottom margin,
      ~65 wide, semicircle right r=50.
  -->
  <path
    d="M 70 66
       L 216 66
       A 95 95 0 0 1 216 256
       L 150 256
       L 150 446
       L 70 446
       Z
       M 150 111
       L 215 111
       A 50 50 0 0 1 215 211
       L 150 211
       Z"
    fill="url(#pGrad)"
    fill-rule="evenodd"
    filter="url(#pInnerShadow)"
  />

  <!-- Top-rim highlight on the P (beveled-edge suggestion) -->
  <path
    d="M 70 66
       L 216 66
       A 95 95 0 0 1 216 256
       L 150 256
       L 150 446
       L 70 446
       Z
       M 150 111
       L 215 111
       A 50 50 0 0 1 215 211
       L 150 211
       Z"
    fill="url(#pRim)"
    fill-rule="evenodd"
    style="mix-blend-mode:screen"
  />

  <!-- Dot halo (under the dot) -->
  <ellipse cx="420" cy="110" rx="130" ry="130" fill="url(#dotHalo)"/>

  <!-- Jewel dot with base inner shadow -->
  <circle cx="420" cy="110" r="60" fill="url(#dotGrad)" filter="url(#dotInner)"/>

  <!-- Specular highlight, top-left -->
  <ellipse cx="402" cy="92" rx="16" ry="10" fill="#ffffff" fill-opacity="0.32"/>
</svg>
