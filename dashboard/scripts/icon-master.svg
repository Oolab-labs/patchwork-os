<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Patchwork app icon — "P" lettermark with accent dot.

    Composition mirrors public/favicon.svg (geometric sans-serif P
    + orange dot upper-right) but scaled and refined for the larger
    canvas. The P is drawn as a path so the icon renders identically
    regardless of which font the rasterizer falls back to (librsvg
    doesn't have Albert Sans).

    Proportions:
      Canvas 512×512, iOS app-icon corner radius 112.
      P cap height 337 (≈ 66% of canvas), stem width 60, bowl
      extends 125 px right of stem with a 202×202 semicircle.
      Counter (inner hole) is centered vertically inside the bowl
      with 64 px top + 61 px bottom margins so it reads balanced.
      Accent dot: cx=400, cy=135, r=55 — same upper-right placement
      and proportional size as the favicon.

    Polish:
      - Subtle radial warmth on the canvas (center #1f1d1a → edges
        #1a1917) so the icon doesn't read as a flat black square
      - Top-light gradient on the P (#ffffff → #ededed, 4% drop)
        gives a barely-perceptible dimension at large sizes without
        looking glossy at home-screen size
      - Top-light gradient on the dot (#f4794d → #e8622a) for the
        same reason
      - Soft warm halo behind the dot to suggest accent radiance
  -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="80%">
      <stop offset="0%"   stop-color="#1f1d1a"/>
      <stop offset="100%" stop-color="#1a1917"/>
    </radialGradient>

    <linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ededed"/>
    </linearGradient>

    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f4794d"/>
      <stop offset="100%" stop-color="#e8622a"/>
    </linearGradient>

    <radialGradient id="dotHalo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#e8622a" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#e8622a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e8622a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas with subtle radial warmth -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!--
    "P" — outer outline + inner counter as one evenodd-filled path so
    the counter renders as a hole, not a filled rect.
    Outer trace (clockwise from top-left of stem):
      (105, 88) → (230, 88)
        ↳ semicircle arc to (230, 290) — the bowl, radius 101
      → (165, 290) → (165, 425) → (105, 425) → close
    Inner counter (clockwise, inside the bowl):
      (165, 152) → (228, 152)
        ↳ semicircle arc to (228, 229) — radius 38.5
      → (165, 229) → close
  -->
  <path
    d="M 105 88
       L 230 88
       A 101 101 0 0 1 230 290
       L 165 290
       L 165 425
       L 105 425
       Z
       M 165 152
       L 228 152
       A 38.5 38.5 0 0 1 228 229
       L 165 229
       Z"
    fill="url(#pGrad)"
    fill-rule="evenodd"
  />

  <!-- Soft halo behind dot — placed BEFORE the dot so dot sits on top -->
  <ellipse cx="400" cy="135" rx="115" ry="115" fill="url(#dotHalo)"/>

  <!-- Accent dot -->
  <circle cx="400" cy="135" r="55" fill="url(#dotGrad)"/>
</svg>
