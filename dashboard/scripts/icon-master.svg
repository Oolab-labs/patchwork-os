<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Patchwork app icon — centered P + small accent dot.

    Calibration history:
      v1 hand-drawn paths (multiple): bowl too round, counter off
      v2 SF Pro left-anchored P (#400): P at x=155, dot at cx=400 r=54.
         Visual center landed at ~x=304 (canvas center is 256), making
         the icon read as right-heavy on the home screen next to
         center-balanced neighbours (Slack, Termius, Evopay, Teams).
      v3 (this): center the P horizontally (text-anchor=middle, x=256),
         pull the dot closer to the bowl + shrink (r=38 from 54) so it
         reads as a small accent rather than a second subject.

    Render dependency: librsvg/sharp pick the first available font from
    the family stack. On macOS that's SF Pro Display Black, which is
    what the committed PNGs reflect. Fallback chain ends in
    `sans-serif`; glyph shape will differ by host font.
  -->
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#221d18"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <text x="256" y="370"
        font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif"
        font-weight="900"
        font-size="360"
        fill="#ffffff"
        text-anchor="middle">P</text>

  <circle cx="370" cy="148" r="38" fill="#e8622a"/>
</svg>
