version: 1.0.0
name: morning-inbox-triage
description: >
  Overnight: pull inbox, cluster threads, summarize what matters, draft replies. Morning: one
  screen, one tap to approve. Everything else auto-archived or snoozed.
trigger:
  type: cron
  at: 30 4 * * *
context:
  - type: env
    keys:
      - INBOX_PROVIDER
      - INBOX_OAUTH_TOKEN
      - USER_NAME
      - USER_ROLE
  - type: file
    path: ~/.patchwork/inbox-rules.md
steps:
  - id: fetch
    tool: inbox.fetch
    risk: low
    since: last_run
    max: 500
    folders:
      - INBOX
    into: threads
  - id: cluster
    tools:
      - inbox.getThread
    risk: low
    agent:
      prompt: |
        Cluster {{threads}} into buckets:
          - URGENT (named-person ask, deadline <48h, from known-important sender)
          - REPLY  (personal, expects response, not urgent)
          - FYI    (newsletter, notification, receipt — read-only)
          - TRASH  (promo, spam, expired)
        Use ~/.patchwork/inbox-rules.md as the source of truth for what "matters".
        Return JSON: { urgent: Thread[], reply: Thread[], fyi: Thread[], trash: Thread[] }
      into: buckets
  - id: summarize
    risk: low
    agent:
      prompt: |
        For {{buckets.urgent}} and {{buckets.reply}}, write:
          - 1-sentence TL;DR
          - Who + what they want
          - Suggested action (reply / schedule / delegate / ignore)
        Keep total output under 400 words. No hedging.
      into: digest
  - id: draft_replies
    tools:
      - inbox.draftReply
    risk: medium
    agent:
      prompt: |
        For each thread in {{buckets.reply}}, draft a reply in {{USER_NAME}}'s voice.
        Match prior thread tone. Max 4 sentences. Do NOT send — stage for approval.
      into: drafts
  - id: auto_archive
    tool: inbox.archive
    risk: medium
    threads: "{{buckets.trash}}"
  - id: present
    tool: dashboard.render
    risk: low
    title: Morning inbox — {{digest.length}} items need you
    sections:
      - heading: Urgent
        items: "{{buckets.urgent}}"
        approvals: true
      - heading: Drafts ready to send
        items: "{{drafts}}"
        approvals: true
      - heading: Handled overnight
        items: "{{buckets.trash}}"
        collapsed: true
    into: dashboard_url
  - id: notify
    tool: notify.push
    risk: low
    title: Inbox triaged
    body: "{{digest.length}} need you. {{drafts.length}} drafts ready. {{buckets.trash.length}}
      auto-archived."
    url: "{{dashboard_url}}"
on_error:
  notify: true
  retry: 1
  fallback: log_only
