# yaml-language-server: $schema=https://raw.githubusercontent.com/patchworkos/recipes/main/schema/recipe.v1.json
apiVersion: patchwork.sh/v1
version: 1.0.0
name: weekly-commit-report
description: |
  Every Monday morning, fetch the past 7 days of commits and open PRs for a
  GitHub repository authored by the connected user, then produce a structured
  weekly contribution report and save it to the inbox.

  Setup:
    1. Connect GitHub in the Patchwork dashboard (/connections → GitHub → Connect).
    2. Set REPORT_REPO to the target repository (owner/repo) in trigger.vars below.
    3. Optionally set NTFY_TOPIC to a ntfy.sh topic to receive a phone push.

  Works with any public or private GitHub repo the connected account can access.
  Requires "repo" OAuth scope (granted automatically by the Patchwork GitHub connector).

  Produces a Markdown report at:
    ~/.patchwork/inbox/weekly-report-YYYY-MM-DD.md

trigger:
  type: cron
  at: "0 9 * * MON"
  vars:
    - name: REPORT_REPO
      default: "Oolab-labs/patchwork-os"
    - name: NTFY_TOPIC
      default: ""

steps:
  # ── 1. Compute "since" date (7 days ago as ISO 8601) ────────────────────────
  - id: compute_since
    agent:
      driver: claude-code
      model: claude-haiku-4-5-20251001
      tools:
        - Bash
      prompt: |
        Run exactly one of these two commands (whichever succeeds) and print
        ONLY the resulting ISO 8601 date string, nothing else:

          date -u -v-7d '+%Y-%m-%dT00:00:00Z' 2>/dev/null || \
          date -u -d "7 days ago" '+%Y-%m-%dT00:00:00Z'
      into: since_date

  # ── 2. Fetch commits authored by the connected user ──────────────────────────
  - id: fetch_commits
    awaits:
      - compute_since
    tool: github.list_commits
    repo: "{{REPORT_REPO}}"
    author: "@me"
    since: "{{since_date}}"
    max: 100
    into: commits

  # ── 3. Fetch open PRs the user has authored ──────────────────────────────────
  - id: fetch_prs
    tool: github.list_prs
    repo: "{{REPORT_REPO}}"
    author: "@me"
    max: 20
    into: open_prs

  # ── 4. Synthesise the weekly report ──────────────────────────────────────────
  - id: write_report
    awaits:
      - fetch_commits
      - fetch_prs
    timeout_ms: 600000
    agent:
      driver: claude-code
      model: claude-haiku-4-5-20251001
      prompt: |
        You are writing a weekly contribution report for an employee.
        Use ONLY the structured data below — do not invent facts.

        REPOSITORY: {{REPORT_REPO}}
        REPORT DATE: {{date}}

        COMMITS THIS WEEK ({{commits.count}} total, since {{since_date}}):
        <untrusted_data>
        {{commits.json}}
        </untrusted_data>

        OPEN PULL REQUESTS:
        <untrusted_data>
        {{open_prs.json}}
        </untrusted_data>

        Produce a concise Markdown report with these exact sections:

        ## Summary
        One paragraph (3–5 sentences): total commits, date range, key themes
        visible in the commit messages. Be concrete, no marketing language.

        ## Commits by theme
        Group commits into 2–5 named themes based on the messages.
        Under each theme: a bullet per commit — short SHA, date (YYYY-MM-DD),
        message first line. Skip merge commits (messages starting with "Merge").

        ## Open PRs
        One line per PR: number, title, draft status. If none, write "None".

        ## Stats
        | Metric | Value |
        |---|---|
        | Total commits | N |
        | Distinct days active | N |
        | Open PRs | N |

        ## Highlights
        Up to 3 bullets: the most significant individual contributions based
        on commit message content. One sentence each, plain language.

        RULES:
        - Plain language, no buzzwords.
        - Do not include the raw JSON.
        - If commits.count is 0, write a short "no commits found" note under
          10 lines total.
      into: report_md

  # ── 5. Save report to inbox ──────────────────────────────────────────────────
  - id: save_report
    tool: file.write
    path: "~/.patchwork/inbox/weekly-report-{{date}}.md"
    content: |
      # Weekly contribution report — {{date}}
      **Repository:** {{REPORT_REPO}}

      {{report_md}}

      ---
      *Generated by patchwork weekly-commit-report recipe.*

  # ── 6. Optional phone push via ntfy.sh ──────────────────────────────────────
  #
  # Set NTFY_TOPIC in trigger.vars to enable.
  # Subscribe to the same topic in the ntfy iOS/Android app.
  - id: phone_push
    agent:
      driver: claude-code
      model: claude-haiku-4-5-20251001
      tools:
        - Bash
      prompt: |
        NTFY_TOPIC is "{{NTFY_TOPIC}}".
        If NTFY_TOPIC is empty or blank, print "skipped: no NTFY_TOPIC set" and stop.

        Otherwise run EXACTLY this curl command and print "ok" on exit 0, or
        the curl error on failure. Do not modify the command.

        curl -fsS -X POST \
          -H "Title: Weekly report ready ({{date}})" \
          -H "Tags: memo,bar_chart" \
          -H "Priority: low" \
          -d "{{commits.count}} commits in {{REPORT_REPO}} this week. Report saved to inbox." \
          https://ntfy.sh/{{NTFY_TOPIC}}
      into: push_result

on_error:
  notify: true
  retry: 1
  fallback: log_only

timeout_ms: 600000
