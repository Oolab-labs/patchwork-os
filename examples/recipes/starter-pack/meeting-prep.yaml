# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: calendar-mcp, fetch-mcp, gmail-mcp, notify-mcp
version: 1.0.0
name: meeting-prep
description: >
  Fires 15 minutes before any calendar event with other humans. Pulls last conversation with those
  people, relevant docs linked in the invite, and suggests one real question to ask based on what's
  unresolved.
trigger:
  type: event
  on: calendar.upcoming
  lead_time_minutes: 15
  filter:
    has_attendees: true
context:
  - type: env
    keys:
      - USER_NAME
steps:
  - id: event_info
    tool: calendar.get
    risk: low
    event_id: "{{event.id}}"
    into: meeting
  - id: prior_threads
    tool: inbox.search
    risk: low
    query: from:({{meeting.attendees}}) OR to:({{meeting.attendees}}) after:30d
    limit: 10
    into: threads
  - id: synthesize
    tools:
      - fetch.url
    risk: low
    agent:
      prompt: |
        Meeting: {{meeting.title}} with {{meeting.attendees}} at {{meeting.start}}.
        Agenda/description: {{meeting.description}}
        Prior threads: {{threads}}
        Produce:
          1. 3-line context (what's this about, what's been said)
          2. One sharp question to ask (something unresolved, not performative)
          3. If there's a doc link in the invite, pre-fetch summary
        Under 200 words. No filler.
      into: brief
  - id: push
    tool: notify.push
    risk: low
    title: "In 15: {{meeting.title}}"
    body: "{{brief}}"
on_error:
  notify: false
  retry: 0
