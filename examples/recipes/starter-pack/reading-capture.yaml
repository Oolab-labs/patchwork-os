# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: gmail-mcp
version: 1.0.0
name: reading-capture
description: >
  Collects highlights from Kindle emails, Readwise, or browser extension. Tags by theme. Once a
  week, synthesizes "what you kept highlighting this week" into one short note.
trigger:
  type: event
  on: inbox.new_message
  filter:
    from:
      - no-reply@amazon.com
      - readwise@readwise.io
context:
  - type: env
    keys:
      - HIGHLIGHTS_PATH
steps:
  - id: extract
    risk: low
    agent:
      prompt: |
        Extract highlights from this message as JSON array:
        { source, author, quote, location?, date }
        Input: {{event.message}}
      into: highlights
  - id: tag
    risk: low
    agent:
      prompt: |
        Tag each of {{highlights}} with 1-3 themes. Use themes consistent with
        {{HIGHLIGHTS_PATH}}/_themes.md if it exists.
      into: tagged
  - id: append
    tool: file.append
    risk: low
    path: "{{HIGHLIGHTS_PATH}}/{{YYYY-MM}}.md"
    content: "{{tagged}}"
on_error:
  notify: false
  retry: 1
