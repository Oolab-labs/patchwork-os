version: 1.0.0
name: gift-brain
description: >
  Second brain for gifting. Passively collects mentions ("Sara said she's getting into pottery")
  from notes/chats. Two weeks before a known date, surfaces 3 gift ideas tied to real things that
  person said.
trigger:
  type: cron
  at: 0 9 * * *
context:
  - type: env
    keys:
      - USER_NAME
  - type: file
    path: ~/.patchwork/people.md
steps:
  - id: scan_mentions
    tools:
      - notes.search
      - contacts.list
    risk: low
    agent:
      prompt: |
        Scan recent notes and chats for mentions of anyone in ~/.patchwork/people.md
        wanting / liking / being into something. Return JSON: { person, mention, date, source }.
        Last 30 days only.
      into: signals
  - id: update_profiles
    tool: file.merge_yaml
    risk: low
    path: ~/.patchwork/people.md
    updates: "{{signals}}"
  - id: check_upcoming
    tool: contacts.upcomingDates
    risk: low
    window_days: 14
    into: upcoming
  - id: ideate
    risk: low
    skip_if: "{{upcoming.length == 0}}"
    agent:
      prompt: |
        For each person in {{upcoming}}, propose 3 gift ideas grounded in their
        entry in ~/.patchwork/people.md. Each idea: <$X budget hint, why it fits,
        where to get it. No generic "scented candle" filler.
      into: ideas
  - id: notify
    tool: notify.push
    skip_if: "{{upcoming.length == 0}}"
    risk: low
    title: "{{upcoming.length}} gift windows coming up"
    body: "{{ideas.summary}}"
on_error:
  notify: false
  retry: 1
