# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: gmail-mcp, log-mcp
version: 1.0.0
name: compliment-archive
description: >
  Passively collects real compliments — from emails, messages, reviews, PR comments — and saves them
  with source + date. When you type "show me the good stuff" or on rough days detected from
  calendar, surfaces 3 at random.
trigger:
  type: event
  on: inbox.new_message
context:
  - type: env
    keys:
      - USER_NAME
      - ARCHIVE_PATH
steps:
  - id: detect
    risk: low
    agent:
      prompt: |
        Is this message a genuine compliment or expression of appreciation for
        {{USER_NAME}}? Reject: transactional thanks ("thanks for sending"),
        form letters, auto-replies. Accept: specific praise, gratitude with
        context, unsolicited positive feedback.
        Return JSON: { is_compliment: bool, excerpt, sender, context } or null.
        Input: {{event.message}}
      into: hit
  - id: append
    tool: file.append
    skip_if: "{{hit == null || !hit.is_compliment}}"
    risk: low
    path: "{{ARCHIVE_PATH}}"
    content: |
      ---
      {{YYYY-MM-DD}} — from {{hit.sender}}
      > {{hit.excerpt}}
      ({{hit.context}})
  - id: confirm_silent
    tool: log.info
    skip_if: "{{hit == null}}"
    risk: low
    message: Archived compliment from {{hit.sender}}
on_error:
  notify: false
  retry: 1
  fallback: log_only
