version: 1.0.0
name: errand-batcher
description: >
  Scans notes and recent messages for "I need to / don't forget to / pick up / call / return"
  mentions. Groups by location or type. Weekly delivers a route-optimized list so you do 5 errands
  in one trip instead of 5 trips.
trigger:
  type: cron
  at: 0 9 * * 6
context:
  - type: env
    keys:
      - HOME_AREA
steps:
  - id: scan
    tools:
      - notes.search
      - inbox.search
    risk: low
    agent:
      prompt: |
        Scan notes and sent messages from last 14 days for action items:
        "I need to", "don't forget", "pick up", "drop off", "return", "call",
        "fix", "buy". Exclude work/code tasks. Return JSON:
        { item, source, mentioned_at, location_hint? }
      into: items
  - id: group
    risk: low
    agent:
      prompt: |
        Group {{items}} by: physical_errand / phone_call / online_order / household.
        For physical_errand, guess location near {{HOME_AREA}} if possible.
        Propose a route order for Saturday.
      into: plan
  - id: present
    tool: dashboard.render
    risk: low
    title: "{{items.length}} loose errands"
    body: "{{plan}}"
    approvals: false
on_error:
  notify: false
  retry: 1
