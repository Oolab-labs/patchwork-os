# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: dashboard-mcp, gmail-mcp
version: 1.0.0
name: lost-thread-finder
description: >
  Weekly scan for dropped balls. Finds messages you sent that said "I'll get back to you" / "let me
  check" / "I'll send by Friday" with no follow-through. Lists them with original context and drafts
  a re-engagement message.
trigger:
  type: cron
  at: 0 17 * * 5
context:
  - type: env
    keys:
      - USER_NAME
steps:
  - id: scan_sent
    tool: inbox.search
    risk: low
    query: from:me after:30d ("I'll get back" OR "let me check" OR "I'll send" OR "by next week" OR "by
      Friday")
    into: promises
  - id: check_followups
    tools:
      - inbox.getThread
    risk: low
    agent:
      prompt: |
        For each message in {{promises}}, check if {{USER_NAME}} followed up
        (replied again, sent the thing, thread continued with resolution).
        Return only the dropped ones: { thread_id, recipient, promise_text, days_since }.
      into: dropped
  - id: draft_re_engage
    risk: medium
    agent:
      prompt: |
        For each in {{dropped}}, draft a short re-engage message in {{USER_NAME}}'s voice.
        Acknowledge the gap without over-apologizing. Actually deliver the thing
        if possible, or name a new date. Max 3 sentences.
      into: drafts
  - id: present
    tool: dashboard.render
    risk: low
    title: "{{dropped.length}} dropped threads"
    sections:
      - heading: Re-engage drafts
        items: "{{drafts}}"
        approvals: true
on_error:
  notify: true
  retry: 1
