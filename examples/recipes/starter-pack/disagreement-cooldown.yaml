version: 1.0.0
name: disagreement-cooldown
description: >
  When you write a reply that flags as heated (sentiment + keyword detection), holds it 30 minutes
  before sending. Re-presents with: your original, a steel-manned version of the other side, a
  cooler-tone rewrite. You choose.
trigger:
  type: event
  on: inbox.draft_saved
context:
  - type: env
    keys:
      - USER_NAME
steps:
  - id: temperature_check
    risk: low
    agent:
      prompt: |
        Rate heat level of this draft 0-5:
          0: neutral
          3: firm but civil
          5: will regret in 24h
        Return JSON: { heat: int, flags: [...] }
        Input: {{event.draft}}
      into: check
  - id: hold
    tool: queue.delay
    skip_if: "{{check.heat < 4}}"
    risk: high
    item: "{{event.draft_id}}"
    delay_minutes: 30
  - id: steelman
    skip_if: "{{check.heat < 4}}"
    risk: low
    agent:
      prompt: |
        Steel-man the other side of this exchange. Strongest version of their
        point, in one paragraph. Not agreeing — just representing fairly.
        Input: {{event.draft}}
      into: steelman
  - id: cooler_version
    skip_if: "{{check.heat < 4}}"
    risk: low
    agent:
      prompt: |
        Rewrite {{event.draft}} keeping all substance and disagreement,
        removing heat markers in {{check.flags}}. Match {{USER_NAME}}'s voice.
      into: cooler
  - id: re_present
    tool: dashboard.render
    skip_if: "{{check.heat < 4}}"
    risk: high
    title: Held 30 min — still want to send?
    body:
      original: "{{event.draft}}"
      their_strongest_point: "{{steelman}}"
      cooler_version: "{{cooler}}"
    actions:
      - send-original
      - send-cooler
      - edit
      - discard
on_error:
  notify: true
  retry: 0
  fallback: log_only
