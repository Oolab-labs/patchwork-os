version: 1.0.0
name: travel-prep
description: >
  48 hours before any calendar event tagged "travel" or with flight/hotel confirmation in inbox,
  assembles one page: flights, hotel, packing list (weather-aware), auto-reply draft, and drafts to
  people who need to know.
trigger:
  type: event
  on: calendar.upcoming
  lead_time_hours: 48
  filter:
    tags_include:
      - travel
      - trip
context:
  - type: env
    keys:
      - USER_NAME
  - type: file
    path: ~/.patchwork/packing-defaults.md
steps:
  - id: gather
    parallel:
      - tool: inbox.search
        query: flight OR hotel OR booking after:30d
        into: bookings
      - tool: calendar.get
        event_id: "{{event.id}}"
        into: trip
      - tool: weather.forecast
        location: "{{event.location}}"
        days: 7
        into: weather
    risk: low
  - id: synthesize
    risk: low
    agent:
      prompt: |
        Trip: {{trip}}. Bookings: {{bookings}}. Weather: {{weather}}.
        Produce:
          1. Itinerary (flights, hotel, key times, confirmation numbers)
          2. Packing list merged from ~/.patchwork/packing-defaults.md + weather
          3. Auto-reply draft for dates away
          4. List of people to loop in (from recent threads)
      into: pack
  - id: draft_notices
    risk: medium
    agent:
      prompt: |
        Draft a short message to each person in {{pack.people_to_notify}}
        in {{USER_NAME}}'s voice. Dates, response time, who to reach instead.
      into: notices
  - id: present
    tool: dashboard.render
    risk: low
    title: "Trip prep: {{trip.title}}"
    body: "{{pack}}"
    sections:
      - heading: Notices to send
        items: "{{notices}}"
        approvals: true
on_error:
  notify: true
  retry: 1
