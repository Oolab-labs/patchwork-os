# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: calendar-mcp, dashboard-mcp
version: 1.0.0
name: calendar-defense
description: >
  Morning sweep of the week's calendar. Detects double-bookings, meetings without agendas,
  back-to-back stretches with no breaks, and eroded deep-work blocks. Drafts polite
  decline/reschedule messages for approval.
trigger:
  type: cron
  at: 0 7 * * 1-5
context:
  - type: env
    keys:
      - USER_NAME
      - USER_ROLE
      - DEEP_WORK_HOURS
  - type: file
    path: ~/.patchwork/meeting-rules.md
steps:
  - id: fetch_week
    tool: calendar.list
    risk: low
    range: next_7_days
    into: events
  - id: analyze
    risk: low
    agent:
      prompt: |
        Review {{events}} against ~/.patchwork/meeting-rules.md.
        Flag:
          - CONFLICT: overlapping events
          - NO_AGENDA: meeting with no description or agenda link
          - EROSION: meeting booked inside {{DEEP_WORK_HOURS}}
          - STACKED: 3+ meetings back-to-back with no buffer
          - LOW_VALUE: recurring meeting {{USER_NAME}} has declined last 2 times
        For each flag, propose: decline / reschedule / shorten / ask-for-agenda.
        Return JSON: { flags: Flag[] }
      into: flags
  - id: draft_messages
    risk: medium
    agent:
      prompt: |
        For each flag in {{flags}} needing outreach, draft a short polite message
        in {{USER_NAME}}'s voice. Max 3 sentences. No apologizing for protecting time.
        Stage — do NOT send.
      into: drafts
  - id: present
    tool: dashboard.render
    risk: low
    title: Calendar — {{flags.length}} flags this week
    sections:
      - heading: Needs action
        items: "{{drafts}}"
        approvals: true
on_error:
  notify: true
  retry: 1
