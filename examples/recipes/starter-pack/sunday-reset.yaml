# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: calendar-mcp, dashboard-mcp, gmail-mcp, notes-mcp
version: 1.0.0
name: sunday-reset
description: >
  Sunday evening ritual. Reviews the week that just happened, spots unfinished threads, pulls up
  anything you said you'd do, and drafts a loose plan for the week ahead. One screen, approve or
  edit before it commits to calendar.
trigger:
  type: cron
  at: 0 18 * * 0
context:
  - type: env
    keys:
      - USER_NAME
      - CALENDAR_PROVIDER
      - INBOX_PROVIDER
  - type: file
    path: ~/.patchwork/values.md
steps:
  - id: pull_week
    tool: calendar.list
    risk: low
    range: last_7_days
    into: past_events
  - id: pull_inbox_loose_ends
    tool: inbox.search
    risk: low
    query: is:sent after:7d has:question_mark
    into: sent_questions
  - id: pull_notes
    tool: notes.list
    risk: low
    since: last_7_days
    includes:
      - todo
      - follow up
      - remember
    into: notes
  - id: synthesize
    risk: low
    agent:
      prompt: |
        Using {{past_events}}, {{sent_questions}}, {{notes}}, and ~/.patchwork/values.md:
        1. Loose threads — things {{USER_NAME}} said they'd do but didn't.
        2. Week ahead — propose max 3 priorities aligned with values.md.
        3. Say no — 1-2 things on next week's calendar that don't match priorities.
        Output markdown under 500 words. No motivational filler.
      into: plan
  - id: present
    tool: dashboard.render
    risk: low
    title: Sunday reset — {{plan.priorities.length}} priorities, {{plan.sayNo.length}} to decline
    body: "{{plan}}"
    approvals: true
on_error:
  notify: true
  retry: 1
  fallback: log_only
