version: 1.0.0
name: mood-tagger
description: >
  Tiny check-in. 3x/day it pushes "one emoji, one line." Logs locally. Once a week, correlates dips
  with calendar (meeting X, sleep <6h, Sundays) and reports patterns. No advice — just the shape.
trigger:
  type: cron
  at: 0 10,14,20 * * *
context:
  - type: env
    keys:
      - MOOD_LOG_PATH
steps:
  - id: prompt_user
    tool: notify.ask
    risk: low
    title: One emoji, one line
    timeout_seconds: 300
    schema:
      emoji: string
      note: string
    into: check_in
  - id: log
    tool: file.append
    skip_if: "{{check_in == null}}"
    risk: low
    path: "{{MOOD_LOG_PATH}}"
    content: "{{ISO_NOW}} | {{check_in.emoji}} | {{check_in.note}}"
on_error:
  notify: false
  retry: 0
  fallback: log_only
