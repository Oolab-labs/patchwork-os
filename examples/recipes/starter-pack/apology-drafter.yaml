# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: dashboard-mcp
version: 1.0.0
name: apology-drafter
description: >
  On-demand. You type "apology for [situation]" and it drafts a clean apology: name the harm, own
  it, say what you'll do differently, stop. No groveling, no excuses, no "I just wanted to." Always
  stages for review.
trigger:
  type: manual
  inputs:
    - name: situation
      type: string
      required: true
    - name: recipient
      type: string
      required: true
    - name: channel
      type: enum
      values:
        - email
        - text
        - slack
        - in-person-script
      default: text
context:
  - type: env
    keys:
      - USER_NAME
  - type: file
    path: ~/.patchwork/voice-samples.md
steps:
  - id: draft
    risk: medium
    agent:
      prompt: |
        Draft an apology from {{USER_NAME}} to {{recipient}} about: {{situation}}.
        Channel: {{channel}}. Match the tone in ~/.patchwork/voice-samples.md.
        Rules:
          1. Name the specific harm in 1 sentence.
          2. Own it — no "if you felt", no passive voice.
          3. State the change (what you'll do differently). Skip if you don't know yet.
          4. Stop. No explaining, no defending.
        Max 4 sentences for text/slack, 6 for email, bullet script for in-person.
      into: draft
  - id: critique
    risk: low
    agent:
      prompt: |
        Critique {{draft}} for: deflection, excuses, "I just", over-apologizing,
        centering yourself. Return revised version if needed.
      into: final
  - id: present
    tool: dashboard.render
    risk: medium
    title: Apology draft
    body: "{{final}}"
    approvals: true
    actions:
      - copy
      - send
      - edit
      - discard
on_error:
  notify: true
  retry: 0
  fallback: log_only
