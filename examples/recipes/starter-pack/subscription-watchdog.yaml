# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: dashboard-mcp, gmail-mcp, notes-mcp
version: 1.0.0
name: subscription-watchdog
description: >
  Monthly audit of recurring charges. Detects subs you haven't used in 60 days, price hikes, and
  duplicate services. Drafts cancellation emails/links for approval. Always shows total monthly burn
  at top.
trigger:
  type: cron
  at: 0 10 1 * *
context:
  - type: env
    keys:
      - LEDGER_PATH
      - INBOX_PROVIDER
steps:
  - id: detect_subs
    risk: low
    agent:
      prompt: |
        From {{LEDGER_PATH}} last 90 days, find all recurring charges
        (same vendor, similar amount, monthly or annual cadence).
        Return JSON: { vendor, amount, cadence, first_seen, last_seen, trend }
        where trend = "steady" | "hiked" | "first-time".
      into: subs
  - id: usage_check
    tools:
      - notes.search
      - inbox.search
    risk: low
    agent:
      prompt: |
        For each sub in {{subs}}, try to detect recent usage:
          - App on device? Recent login email? Mentioned in notes/calendar?
        Mark each as: "used", "unused>60d", "unknown".
      into: usage
  - id: triage
    risk: medium
    agent:
      prompt: |
        Combine {{subs}} + {{usage}}. Surface:
          - CANCEL: unused>60d
          - REVIEW: price hiked >15%
          - DUPLICATE: two subs, same category
        Total monthly burn. For each CANCEL, draft message or find cancel URL.
      into: report
  - id: present
    tool: dashboard.render
    risk: low
    title: "Subs: ${{report.monthly_total}}/mo — {{report.cancel.length}} to cut"
    body: "{{report}}"
    approvals: true
on_error:
  notify: true
  retry: 1
