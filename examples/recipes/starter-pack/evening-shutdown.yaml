# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: calendar-mcp, gmail-mcp, system-mcp
version: 1.0.0
name: evening-shutdown
description: >
  End-of-day ritual. Pulls today's completed calendar events + sent messages, asks one question
  ("what's still open?"), writes tomorrow's top-3, then flips do-not-disturb for the evening.
trigger:
  type: cron
  at: 0 18 * * 1-5
context:
  - type: env
    keys:
      - USER_NAME
      - JOURNAL_PATH
steps:
  - id: collect_done
    tool: calendar.list
    risk: low
    range: today
    status: completed
    into: done_events
  - id: summarize_day
    tools:
      - inbox.search
    risk: low
    agent:
      prompt: |
        From {{done_events}} and today's sent messages, write 3-5 bullets
        on what actually happened. No fluff.
      into: recap
  - id: ask_open_loops
    interactive: true
    risk: low
    agent:
      prompt: |
        Ask {{USER_NAME}}: "What's still open in your head?" — one question,
        wait for answer. Then ask: "What are the 3 things for tomorrow?"
      into: loops_and_tomorrow
  - id: write_journal
    tool: file.append
    risk: low
    path: "{{JOURNAL_PATH}}/{{YYYY-MM-DD}}.md"
    content: |
      ## Done
      {{recap}}
      ## Open loops
      {{loops_and_tomorrow.loops}}
      ## Tomorrow top-3
      {{loops_and_tomorrow.tomorrow}}
  - id: do_not_disturb
    tool: system.setDND
    risk: medium
    requires_approval: true
    enabled: true
    until: 07:00 tomorrow
on_error:
  notify: true
  retry: 1
