# vision-tier — this recipe references integrations that are not yet
# bundled with patchwork-os. Steps that depend on a missing tool will
# `skip` (with a warning) rather than crash; see ./README.md for status.
# requires: calendar-mcp, gmail-mcp, notes-mcp, notify-mcp, weather-mcp
version: 1.0.0
name: morning-brief
description: >
  6am brief. One screen. Weather, first 3 meetings, 3 inbox items that need you today, and one line
  from yesterday's notes to remind you where you left off.
trigger:
  type: cron
  at: 0 6 * * 1-5
context:
  - type: env
    keys:
      - USER_NAME
      - LOCATION
steps:
  - id: parallel_fetch
    parallel:
      - tool: weather.today
        location: "{{LOCATION}}"
        into: weather
      - tool: calendar.list
        range: today
        limit: 3
        into: events
      - tool: inbox.search
        query: is:unread is:important
        limit: 3
        into: urgent
      - tool: notes.last
        limit: 1
        into: yesterday
    risk: low
  - id: compose
    risk: low
    agent:
      prompt: |
        Compose a 6-line morning brief for {{USER_NAME}}:
          L1: weather ({{weather}})
          L2-4: three calendar events with times ({{events}})
          L5: urgent count + top sender ({{urgent}})
          L6: "yesterday you were on: {{yesterday}}"
        No greeting. No motivational filler.
      into: brief
  - id: send
    tool: notify.push
    risk: low
    title: Morning brief
    body: "{{brief}}"
on_error:
  notify: false
  retry: 1
