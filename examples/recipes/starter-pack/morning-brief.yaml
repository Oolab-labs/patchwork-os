# Morning brief: weather + first 3 calendar events + 3 urgent inbox items + one sentence from yesterday's notes.
name: morning-brief
version: "1.0.0"
description: >
  6am brief. One screen. Weather, first 3 meetings, 3 inbox items that need
  you today, and one line from yesterday's notes to remind you where you left off.
# requires: gmail-mcp, calendar-mcp, weather-mcp

trigger:
  type: cron
  schedule: "0 6 * * 1-5"

context:
  - type: env
    keys: [USER_NAME, LOCATION]

steps:
  - id: parallel_fetch
    parallel:
      - tool: weather.today
        params: { location: "{{LOCATION}}" }
        output: weather
      - tool: calendar.list
        params: { range: "today", limit: 3 }
        output: events
      - tool: inbox.search
        params: { query: "is:unread is:important", limit: 3 }
        output: urgent
      - tool: notes.last
        params: { limit: 1 }
        output: yesterday
    risk: low

  - id: compose
    agent: true
    prompt: |
      Compose a 6-line morning brief for {{USER_NAME}}:
        L1: weather ({{weather}})
        L2-4: three calendar events with times ({{events}})
        L5: urgent count + top sender ({{urgent}})
        L6: "yesterday you were on: {{yesterday}}"
      No greeting. No motivational filler.
    output: brief
    risk: low

  - id: send
    agent: false
    tool: notify.push
    params:
      title: "Morning brief"
      body: "{{brief}}"
    risk: low

on_error:
  notify: false
  retry: 1
