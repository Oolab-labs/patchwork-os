version: 1.0.0
name: social-battery-planner
description: >
  Looks at upcoming calendar, scores each event by social load (solo, small group, large group,
  performance), flags days over the user's threshold, and suggests recovery slots. Does not cancel —
  surfaces the shape.
trigger:
  type: cron
  at: 0 19 * * 0
context:
  - type: env
    keys:
      - USER_NAME
      - DAILY_SOCIAL_BUDGET
  - type: file
    path: ~/.patchwork/social-profile.md
steps:
  - id: fetch
    tool: calendar.list
    risk: low
    range: next_7_days
    into: events
  - id: score
    risk: low
    agent:
      prompt: >
        For each event in {{events}}, classify:
          - type: solo / 1:1 / small-group (2-5) / large-group (6+) / performance (speaking, teaching)
          - load: 1-5, weighted by ~/.patchwork/social-profile.md
        Group by day. Flag days where total load > {{DAILY_SOCIAL_BUDGET}}.

        Return JSON: { by_day: {...}, flags: [...], recovery_suggestions: [...] }
      into: plan
  - id: present
    tool: dashboard.render
    risk: low
    title: Week social load — {{plan.flags.length}} heavy days
    body: "{{plan}}"
    approvals: false
on_error:
  notify: false
  retry: 1
