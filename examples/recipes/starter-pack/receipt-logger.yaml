version: 1.0.0
name: receipt-logger
description: >
  Passive receipt capture. Scans inbox for purchase confirmations, parses
  vendor/amount/date/category, appends to a plain-text ledger. End of month, totals by category and
  flags anything weird.
trigger:
  type: event
  on: inbox.new_message
  filter:
    subject_contains:
      - receipt
      - order confirmation
      - invoice
      - your purchase
context:
  - type: env
    keys:
      - LEDGER_PATH
steps:
  - id: extract
    risk: low
    agent:
      prompt: |
        From this email, extract: vendor, amount, currency, date, category
        (groceries / dining / subscription / travel / tools / other), and a
        1-line note. If it's not actually a receipt, return null.
        Input: {{event.message}}
      into: entry
  - id: append
    tool: file.append
    risk: low
    skip_if: "{{entry == null}}"
    path: "{{LEDGER_PATH}}"
    content: "{{entry.date}} | {{entry.vendor}} | {{entry.amount}} {{entry.currency}} |
      {{entry.category}} | {{entry.note}}"
  - id: flag_anomaly
    risk: low
    agent:
      prompt: |
        Compare {{entry}} to the last 30 days in {{LEDGER_PATH}}.
        If amount > 3x typical for this vendor, OR category is unusual for this time of month,
        return an alert. Otherwise return null.
      into: alert
  - id: notify_if_weird
    tool: notify.push
    skip_if: "{{alert == null}}"
    risk: low
    title: Receipt looks unusual
    body: "{{alert}}"
on_error:
  notify: false
  retry: 2
  fallback: log_only
