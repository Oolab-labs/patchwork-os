<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc785c"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Terminal prompt > -->
  <text x="8" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="url(#accent)">&#62;_</text>

  <!-- Bridge connector dots — top right -->
  <circle cx="50" cy="14" r="3.5" fill="#a855f7" opacity="0.9"/>
  <circle cx="50" cy="25" r="2.5" fill="#cc785c" opacity="0.7"/>
  <line x1="50" y1="17.5" x2="50" y2="22.5" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
</svg>
